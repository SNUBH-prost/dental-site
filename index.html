<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>치과 임상 자료실</title>

  <!-- PWA -->
  <link rel="manifest" href="/dental-site/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="치과자료실">
  <link rel="apple-touch-icon" href="/dental-site/icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="/dental-site/icons/icon.svg">

  <link rel="stylesheet" href="css/style.css?v=6">
  <link rel="stylesheet" href="css/editor.css?v=6">
  <script>(function(){var t=localStorage.getItem('dental-theme')||'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-inner">
    <a class="logo" href="#" onclick="showPage('home')">치과<span>임상</span>자료실</a>

    <nav id="main-nav">
      <a href="#" data-page="home" class="nav-link active" onclick="showPage('home')">홈</a>
      <a href="#" data-page="cases" class="nav-link" onclick="showPage('cases')">임상 케이스</a>

      <!-- 진료과 드롭다운 -->
      <div class="nav-group" id="nav-group-dept">
        <button class="nav-group-btn" id="dept-btn" onclick="toggleDeptMenu(event)">
          진료과 <span class="arrow">▾</span>
        </button>
        <div class="nav-group-panel">
          <a href="#" data-page="dept-fixed"   onclick="showPage('dept-fixed');closeDeptMenu()">🦷 고정성</a>
          <a href="#" data-page="dept-implant" onclick="showPage('dept-implant');closeDeptMenu()">⚙️ 임플란트</a>
          <a href="#" data-page="dept-rpd"     onclick="showPage('dept-rpd');closeDeptMenu()">🔩 RPD</a>
          <a href="#" data-page="dept-cd"      onclick="showPage('dept-cd');closeDeptMenu()">😁 CD</a>
        </div>
      </div>

      <a href="admin.html" class="nav-link nav-admin">관리</a>
    </nav>

    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="다크 모드 전환">🌙</button>
      <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- ── 모바일 드로어 ── -->
<div class="mobile-drawer" id="mobile-drawer">
  <div class="drawer-header">
    <span class="drawer-logo">치과<span>임상</span>자료실</span>
    <button class="drawer-close" onclick="toggleMobileMenu()">✕</button>
  </div>
  <div class="drawer-nav">
    <a href="#" onclick="showPage('home');toggleMobileMenu()">🏠 홈</a>
    <a href="#" onclick="showPage('cases');toggleMobileMenu()">📋 임상 케이스</a>
    <div class="drawer-section-label">진료과</div>
    <a href="#" onclick="showPage('dept-fixed');toggleMobileMenu()">🦷 고정성</a>
    <a href="#" onclick="showPage('dept-implant');toggleMobileMenu()">⚙️ 임플란트</a>
    <a href="#" onclick="showPage('dept-rpd');toggleMobileMenu()">🔩 RPD</a>
    <a href="#" onclick="showPage('dept-cd');toggleMobileMenu()">😁 CD</a>
    <div class="drawer-section-label">기타</div>
    <a href="admin.html">⚙ 관리</a>
  </div>
</div>
<div class="drawer-overlay" id="drawer-overlay" onclick="toggleMobileMenu()"></div>

<main>
  <!-- ── Home ── -->
  <div id="page-home" class="page active">
    <div class="hero">
      <h1>치과 임상 자료실</h1>
      <p>임상 케이스 및 각과별 참고 자료를 정리한 공유 플랫폼입니다.</p>
    </div>
    <div class="section-header">
      <div class="section-title">진료과별 자료</div>
    </div>
    <div class="dept-grid" id="dept-grid-home"></div>
    <div class="section-header">
      <div class="section-title">최근 임상 케이스</div>
      <a href="#" onclick="showPage('cases')" style="font-size:0.85rem;color:var(--primary-light);">전체 보기 →</a>
    </div>
    <div class="card-grid" id="recent-cases"></div>
  </div>

  <!-- ── Clinical Cases ── -->
  <div id="page-cases" class="page">
    <div class="section-header">
      <div class="section-title">임상 케이스</div>
    </div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="케이스 검색..."
        oninput="renderCases(this.value, document.getElementById('case-dept-filter').value)">
      <button id="bm-filter-btn" class="bm-filter-btn" onclick="toggleBookmarkFilter()">★ 북마크</button>
      <select class="filter-select" id="case-dept-filter"
        onchange="renderCases(document.querySelector('#page-cases .search-input').value, this.value)">
        <option value="">전체</option>
        <option value="fixed">고정성</option>
        <option value="implant">임플란트</option>
        <option value="rpd">RPD</option>
        <option value="cd">CD</option>
      </select>
      <div class="view-toggle-group">
        <button id="view-grid-btn" class="view-toggle-btn active" onclick="setViewMode('grid')" title="카드 보기">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        </button>
        <button id="view-list-btn" class="view-toggle-btn" onclick="setViewMode('list')" title="목록 보기">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2" rx="1"/><rect x="1" y="7" width="14" height="2" rx="1"/><rect x="1" y="12" width="14" height="2" rx="1"/></svg>
        </button>
      </div>
    </div>
    <div class="card-grid" id="cases-grid"></div>
  </div>

  <!-- ── 고정성 ── -->
  <div id="page-dept-fixed" class="page">
    <div class="section-header"><div class="section-title">🦷 고정성</div></div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('fixed',this.value)">
    </div>
    <div class="card-grid" id="dept-content-fixed"></div>
  </div>

  <!-- ── 임플란트 ── -->
  <div id="page-dept-implant" class="page">
    <div class="section-header"><div class="section-title">⚙️ 임플란트</div></div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('implant',this.value)">
    </div>
    <div class="card-grid" id="dept-content-implant"></div>
  </div>

  <!-- ── RPD ── -->
  <div id="page-dept-rpd" class="page">
    <div class="section-header"><div class="section-title">🔩 RPD</div></div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('rpd',this.value)">
    </div>
    <div class="card-grid" id="dept-content-rpd"></div>
  </div>

  <!-- ── CD ── -->
  <div id="page-dept-cd" class="page">
    <div class="section-header"><div class="section-title">😁 CD</div></div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('cd',this.value)">
    </div>
    <div class="card-grid" id="dept-content-cd"></div>
  </div>
</main>

<!-- ── 케이스 상세 모달 ── -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <button class="modal-share-btn" onclick="_copyShareLink()" title="링크 복사">🔗</button>
    <div id="gallery-section"></div>
    <div class="modal-body">
      <div class="modal-dept-tag" id="modal-dept"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-date"   id="modal-date"></div>
      <div class="modal-section-label">설명</div>
      <div class="modal-description" id="modal-description"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <div id="refs-section" style="display:none">
        <div class="modal-section-label" style="margin-top:1.5rem">참고 논문</div>
        <ul class="reference-list" id="modal-refs"></ul>
      </div>
      <div class="page-bottom-nav">
        <button onclick="document.getElementById('modal-overlay').scrollTo({top:0,behavior:'smooth'})">↑ 맨 위로</button>
      </div>
    </div>
  </div>
</div>

<!-- ── 인라인 에디터 ── -->
<div id="editor-overlay" class="editor-overlay">
  <div class="editor-panel">
    <div class="editor-panel-header">
      <h2 id="editor-form-title">편집</h2>
      <button class="editor-panel-close" onclick="closeEditor()">✕</button>
    </div>
    <div id="editor-form-content"></div>
  </div>
</div>
<div id="ed-toast"></div>
<button class="scroll-top-btn" id="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="맨 위로">↑</button>

<!-- ── 주석 에디터 오버레이 ── -->
<div id="ann-editor-overlay" style="display:none">
  <div id="ann-toolbar">
    <div class="ann-tool-group">
      <button id="ann-btn-arrow" class="ann-tool-btn active" onclick="_annSetTool('arrow')">→ 화살표</button>
      <button id="ann-btn-circle" class="ann-tool-btn" onclick="_annSetTool('circle')">○ 원</button>
      <button id="ann-btn-text" class="ann-tool-btn" onclick="_annSetTool('text')">T 텍스트</button>
    </div>
    <div class="ann-color-group">
      <button class="ann-color-btn active" data-color="#ef4444" style="background:#ef4444" onclick="_annSetColor('#ef4444')"></button>
      <button class="ann-color-btn" data-color="#f97316" style="background:#f97316" onclick="_annSetColor('#f97316')"></button>
      <button class="ann-color-btn" data-color="#facc15" style="background:#facc15" onclick="_annSetColor('#facc15')"></button>
      <button class="ann-color-btn" data-color="#22c55e" style="background:#22c55e" onclick="_annSetColor('#22c55e')"></button>
      <button class="ann-color-btn" data-color="#60a5fa" style="background:#60a5fa" onclick="_annSetColor('#60a5fa')"></button>
      <button class="ann-color-btn" data-color="#ffffff" style="background:#fff;border:2px solid #475569" onclick="_annSetColor('#ffffff')"></button>
    </div>
    <div class="ann-action-group">
      <button class="ann-action-btn" onclick="_annUndo()">↩ 실행취소</button>
      <button class="ann-action-btn danger" onclick="_annClear()">🗑 전체삭제</button>
      <button class="ann-action-btn save" onclick="_annSave()">저장 ✓</button>
      <button class="ann-action-btn" onclick="_annCancel()">취소</button>
    </div>
  </div>
  <div id="ann-canvas-area">
    <div id="ann-img-wrap">
      <img id="ann-img" alt="">
      <svg id="ann-svg"></svg>
    </div>
  </div>
  <div id="ann-hint">드래그로 그리기 · 클릭으로 텍스트 배치</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/cloudinary-config.js"></script>
<script src="js/app.js"></script>
<script>
// ── 드롭다운 ──
function toggleDeptMenu(e) {
  e.stopPropagation();
  document.getElementById('nav-group-dept').classList.toggle('open');
}
function closeDeptMenu() {
  document.getElementById('nav-group-dept').classList.remove('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#nav-group-dept')) closeDeptMenu();
});

// ── 모바일 드로어 ──
function toggleMobileMenu() {
  const isOpen = document.getElementById('mobile-drawer').classList.contains('open');
  document.getElementById('mobile-drawer').classList.toggle('open');
  document.getElementById('drawer-overlay').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('active');
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

// ── 진료과 버튼 active 표시 ──
const _origShowPage = showPage;
showPage = function(pageId) {
  _origShowPage(pageId);
  const isDept = pageId.startsWith('dept-');
  const btn = document.getElementById('dept-btn');
  if (btn) btn.classList.toggle('active', isDept);
};
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/dental-site/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
