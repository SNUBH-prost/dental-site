<!DOCTYPE html>
<html lang="ko">
<head>

<body>

<!-- ── Header ── -->

          <a href="javascript:void(0)" data-page="dept-rpd"       onclick="showPage('dept-rpd');closeDeptMenu()"><img src="/dental-site/icons/icon-rpd.svg" style="width:1.8em;height:1.8em;vertical-align:middle;margin-right:0.3em"> RPD</a>
          <a href="javascript:void(0)" data-page="dept-cd"        onclick="showPage('dept-cd');closeDeptMenu()"><img src="/dental-site/icons/icon-cd.svg" style="width:1.8em;height:1.8em;vertical-align:middle;margin-right:0.3em"> CD</a>
          <a href="javascript:void(0)" data-page="dept-materials" onclick="showPage('dept-materials');closeDeptMenu()">🧪 재료</a>
          <a href="javascript:void(0)" data-page="dept-qna"       onclick="showPage('dept-qna');closeDeptMenu()">💬 Q&amp;A</a>
        </div>
      </div>

      <a href="admin.html?v=1" class="nav-link nav-admin">관리</a>
    </nav>

    <div class="header-actions">
      <button class="header-search-btn" onclick="_openSearch()" aria-label="검색">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="7.5" cy="7.5" r="5"/><line x1="11.5" y1="11.5" x2="16" y2="16"/></svg>
      </button>
      <a href="admin.html?v=1" class="header-write-btn" aria-label="글쓰기">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 2.5l3 3L5 16H2v-3L12.5 2.5z"/></svg>
      </a>
      <button class="theme-toggle desktop-theme" id="theme-toggle" onclick="toggleTheme()" aria-label="다크 모드 전환">🌙</button>

        <span></span><span></span><span></span>

  </div>
</header>

<!-- ── 모바일 드로어 ── -->
<div class="mobile-drawer" id="mobile-drawer">
  <div class="drawer-header">
    <span class="drawer-logo">치과<span>임상</span>자료실</span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="다크 모드" style="background:none;border:none;cursor:pointer;font-size:1.3rem;padding:0.2rem 0.4rem;line-height:1;"><span class="theme-toggle-icon">🌙</span></button>

  </div>
  <div class="drawer-nav">
    <a href="javascript:void(0)" onclick="showPage('home');toggleMobileMenu()"><span class="di">🏠</span>홈</a>
    <a href="javascript:void(0)" onclick="showPage('cases');toggleMobileMenu()"><span class="di">📋</span>임상 케이스</a>
    <div class="drawer-section-label">부문별 자료</div>
    <a href="javascript:void(0)" onclick="showPage('dept-fixed');toggleMobileMenu()"><span class="di">🦷</span>고정성</a>
    <a href="javascript:void(0)" onclick="showPage('dept-implant');toggleMobileMenu()"><span class="di"><img src="/dental-site/icons/icon-implant.svg" style="width:1.5em;height:1.5em;display:block;"></span>임플란트</a>
    <a href="javascript:void(0)" onclick="showPage('dept-rpd');toggleMobileMenu()"><span class="di"><img src="/dental-site/icons/icon-rpd.svg" style="width:1.5em;height:1.5em;display:block;"></span>RPD</a>
    <a href="javascript:void(0)" onclick="showPage('dept-cd');toggleMobileMenu()"><span class="di"><img src="/dental-site/icons/icon-cd.svg" style="width:1.5em;height:1.5em;display:block;"></span>CD</a>
    <a href="javascript:void(0)" onclick="showPage('dept-materials');toggleMobileMenu()"><span class="di">🧪</span>재료</a>

</div>
<div class="drawer-overlay" id="drawer-overlay" onclick="toggleMobileMenu()"></div>

<!-- ── 검색 오버레이 ── -->
<div id="search-overlay" class="search-overlay">
  <div class="search-overlay-inner">
    <div class="search-overlay-bar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="7.5" cy="7.5" r="5"/><line x1="11.5" y1="11.5" x2="16" y2="16"/></svg>
      <input id="search-overlay-input" type="text" placeholder="케이스·자료 검색..." autocomplete="off" oninput="_onSearchInput(this.value)">

        <div class="search-section-label">태그 클라우드</div>

      </div>
      <div id="search-results-section" style="display:none">

        <div id="search-results-list"></div>
      </div>
    </div>
  </div>
</div>

<main>
  <!-- ── Home ── -->
  <div id="page-home" class="page active">
    <div class="hero">
      <h1>치과 임상 자료실</h1>
      <p>임상 케이스 및 각과별 참고 자료를 정리한 공유 플랫폼입니다.</p>
    </div>
    <div class="section-header">
      <div class="section-title">부문별 자료</div>
    </div>
    <div class="dept-grid" id="dept-grid-home"></div>
    <div class="section-header">
      <div class="section-title">최근 임상 케이스</div>
      <a href="javascript:void(0)" onclick="showPage('cases')" style="font-size:0.85rem;color:var(--primary-light);">전체 보기</a>
    </div>
    <div class="card-grid" id="recent-cases"></div>
  </div>

  <!-- ── Clinical Cases ── -->
  <div id="page-cases" class="page">
    <div class="section-header">
      <div class="section-title">임상 케이스</div>
    </div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="케이스 검색..."
        oninput="renderCases(this.value, document.getElementById('case-dept-filter').value)">
      <button id="bm-filter-btn" class="bm-filter-btn" onclick="toggleBookmarkFilter()">★ 북마크</button>
      <select class="filter-select" id="case-dept-filter"
        onchange="renderCases(document.querySelector('#page-cases .search-input').value, this.value)">
        <option value="">전체</option>
        <option value="fixed">고정성</option>
        <option value="implant">임플란트</option>
        <option value="rpd">RPD</option>
        <option value="cd">CD</option>
        <option value="materials">재료</option>
        <option value="qna">Q&amp;A</option>
      </select>
      <div class="view-toggle-group">
        <button id="view-grid-btn" class="view-toggle-btn active" onclick="setViewMode('grid')" title="카드 보기">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        </button>
        <button id="view-list-btn" class="view-toggle-btn" onclick="setViewMode('list')" title="목록 보기">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2" rx="1"/><rect x="1" y="7" width="14" height="2" rx="1"/><rect x="1" y="12" width="14" height="2" rx="1"/></svg>
        </button>
      </div>
    </div>
    <div class="card-grid" id="cases-grid"></div>
  </div>

  <!-- ── 고정성 ── -->
  <div id="page-dept-fixed" class="page">
    <div class="section-header"><div class="section-title">🦷 고정성</div></div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('fixed',this.value)">
    </div>
    <div class="card-grid" id="dept-content-fixed"></div>
  </div>

  <!-- ── 임플란트 ── -->
  <div id="page-dept-implant" class="page">
    <div class="section-header"><div class="section-title"><img src="/dental-site/icons/icon-implant.svg" style="width:1.2em;height:1.2em;vertical-align:middle;margin-right:0.3em"> 임플란트</div></div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('implant',this.value)">
    </div>
    <div class="card-grid" id="dept-content-implant"></div>
  </div>

  <!-- ── RPD ── -->
  <div id="page-dept-rpd" class="page">
    <div class="section-header"><div class="section-title"><img src="/dental-site/icons/icon-rpd.svg" style="width:1.2em;height:1.2em;vertical-align:middle;margin-right:0.3em"> RPD</div></div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('rpd',this.value)">
    </div>
    <div class="card-grid" id="dept-content-rpd"></div>
  </div>

  <!-- ── CD ── -->
  <div id="page-dept-cd" class="page">

      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('cd',this.value)">
    </div>
    <div class="card-grid" id="dept-content-cd"></div>
  </div>

  <!-- ── 재료 ── -->
  <div id="page-dept-materials" class="page">
    <div class="section-header"><div class="section-title">🧪 재료</div></div>
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="자료 검색..." oninput="filterDept('materials',this.value)">
    </div>

  </div>

  <!-- ── Q&A ── -->

    <div class="section-header"><div class="section-title">💬 Q&amp;A</div></div>

<!-- ── 케이스 상세 모달 ── -->

      <button class="ann-color-btn active" data-color="#ef4444" style="background:#ef4444" onclick="_annSetColor('#ef4444')"></button>
      <button class="ann-color-btn" data-color="#f97316" style="background:#f97316" onclick="_annSetColor('#f97316')"></button>
      <button class="ann-color-btn" data-color="#facc15" style="background:#facc15" onclick="_annSetColor('#facc15')"></button>
      <button class="ann-color-btn" data-color="#22c55e" style="background:#22c55e" onclick="_annSetColor('#22c55e')"></button>
      <button class="ann-color-btn" data-color="#60a5fa" style="background:#60a5fa" onclick="_annSetColor('#60a5fa')"></button>
      <button class="ann-color-btn" data-color="#ffffff" style="background:#fff;border:2px solid #475569" onclick="_annSetColor('#ffffff')"></button>
    </div>
    <div class="ann-action-group">
      <button class="ann-action-btn" onclick="_annUndo()">↩ 실행취소</button>
      <button class="ann-action-btn danger" onclick="_annClear()">🗑 전체삭제</button>
      <button class="ann-action-btn save" onclick="_annSave()">저장 ✓</button>

  </div>
  <div id="ann-canvas-area">
    <div id="ann-img-wrap">
      <img id="ann-img" alt="">
      <svg id="ann-svg"></svg>
    </div>
  </div>
  <div id="ann-hint">드래그로 그리기 · 클릭으로 텍스트 배치</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/firebase-config.js?v=21"></script>
<script src="js/cloudinary-config.js?v=21"></script>
<script src="js/app.js?v=34"></script>
<script>
// ── 드롭다운 ──
function toggleDeptMenu(e) {
  e.stopPropagation();
  document.getElementById('nav-group-dept').classList.toggle('open');
}
function closeDeptMenu() {
  document.getElementById('nav-group-dept').classList.remove('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#nav-group-dept')) closeDeptMenu();
});

// 드롭다운 항목 클릭 → 페이지 이동 (이벤트 위임)
document.getElementById('nav-group-dept').addEventListener('click', function(e) {
  const link = e.target.closest('a[data-page]');
  if (!link) return;
  e.preventDefault();
  e.stopPropagation();
  closeDeptMenu();
  showPage(link.dataset.page);
});

// ── 모바일 드로어 ──
function toggleMobileMenu() {
  const isOpen = document.getElementById('mobile-drawer').classList.contains('open');
  document.getElementById('mobile-drawer').classList.toggle('open');
  document.getElementById('drawer-overlay').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('active');
  document.body.style.overflow = isOpen ? '' : 'hidden';
}


// ── 진료과 버튼 active 표시 ──
const _origShowPage = showPage;
showPage = function(pageId) {
  _origShowPage(pageId);
  const isDept = pageId.startsWith('dept-');
  const btn = document.getElementById('dept-btn');
  if (btn) btn.classList.toggle('active', isDept);
};

// 상단 nav 직접 링크 (홈, 임상 케이스) 이벤트 위임
document.getElementById('main-nav').addEventListener('click', function(e) {
  const link = e.target.closest('a[data-page]');
  if (!link || link.closest('.nav-group-panel')) return; // 드롭다운은 별도 처리
  e.preventDefault();
  showPage(link.dataset.page);
});
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/dental-site/sw.js').catch(() => {});
  });
}
</script>
</body>
