    <line x1="10" y1="22" x2="54" y2="28"/>
    <line x1="10" y1="33" x2="54" y2="39"/>
    <line x1="10" y1="44" x2="54" y2="50"/>
    <line x1="10" y1="55" x2="54" y2="61"/>
  </g>

  <!-- Highlight (metallic sheen) -->
